# AdCast Agent 配置文件
# 复制此文件为 settings.yaml 并填入你的凭证

name: adcast-agent
log_level: INFO

# ==================== AI 引擎配置 ====================

llm:
  provider: "openai"                  # LLM提供商: openai | anthropic
  model: "gpt-4o"                     # 模型名称
  api_key: ""                         # API Key (建议通过环境变量 ADCAST_LLM_API_KEY 设置)
  base_url: null                      # 自定义API地址（如使用代理）
  temperature: 0.3                    # 决策稳定性（越低越稳定）
  max_tokens: 4096

# ==================== Checkpoint 配置 ====================
# 用于 LangGraph 状态持久化
# - memory: 内存存储（开发/测试，重启丢失）
# - postgres: PostgreSQL存储（生产环境持久化）

checkpoint:
  backend: "memory"                   # memory | postgres
  postgres:
    host: "localhost"
    port: 5432
    database: "adcast"
    user: "adcast"
    password: ""                      # 建议通过环境变量 ADCAST_PG_PASSWORD 设置
    table_name: "checkpoints"

# ==================== 闭环Loop配置 ====================

loop:
  interval_minutes: 60                # 每次循环间隔（分钟）
  max_iterations: 10                  # 最大迭代次数
  auto_resume_after_pause: false      # 暂停后是否自动恢复（需人工审批建议false）

# ==================== 安全设置 ====================

security:
  global_budget_limit_daily: 10000.0    # 全局每日预算上限 (USD)
  require_approval_for_create: true     # 创建Campaign需要确认
  require_approval_for_update: true     # 更新Campaign需要确认
  require_approval_for_delete: true     # 删除Campaign需要确认
  auto_pause_on_overspend: true         # 超支自动暂停
  overspend_threshold: 1.1              # 超支阈值 (110%)
  max_retry_attempts: 3
  request_timeout: 30

# ==================== 长期记忆配置 ====================
# 用于跨 Campaign 经验复用和 LLM RAG 增强
# - placeholder: 内存字典（开发测试，重启丢失）
# - chroma: ChromaDB 本地向量数据库（推荐开发环境）
# - milvus: Milvus 分布式向量数据库（生产环境）

long_term_memory:
  backend: "chroma"                   # placeholder | chroma | milvus
  embedding:
    model: "text-embedding-3-small"   # OpenAI embedding 模型
    api_key: ""                       # 空则自动回退到 llm.api_key
  chroma:
    persist_dir: "./data/chroma"      # 数据持久化目录
    collection_name: "adcast_memory"  # 集合名称
  milvus:
    host: "localhost"
    port: 19530
    user: ""
    password: ""
    collection_name: "adcast_memory"

# ==================== 平台配置 ====================

platforms:
  # ==================== 海外平台 (Official MCP) ====================

  google_ads:
    enabled: false
    mcp_server: "pipx run --spec git+https://github.com/googleads/google-ads-mcp.git google-ads-mcp"
    auth_type: oauth2
    credentials:
      developer_token: ""
      client_id: ""
      client_secret: ""
      refresh_token: ""
      login_customer_id: ""
    budget_limit_daily: 5000.0
    require_approval: true
    extra:
      mcp_args: []

  meta_ads:
    enabled: false
    mcp_server: "npx -y @pipeboard/mcp-meta-ads"
    auth_type: oauth2
    credentials:
      access_token: ""
      app_id: ""
      app_secret: ""
      ad_account_id: ""
    budget_limit_daily: 5000.0
    require_approval: true
    extra:
      mcp_args: []

  amazon_dsp:
    enabled: false
    mcp_server: "https://your-amazon-mcp-server.com/mcp"
    auth_type: oauth2
    credentials:
      client_id: ""
      client_secret: ""
      refresh_token: ""
      profile_id: ""
