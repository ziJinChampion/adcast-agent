# AdCast Agent 配置文件
# 复制此文件为 settings.yaml 并填入你的凭证

name: adcast-agent
log_level: INFO

# 安全设置
security:
  global_budget_limit_daily: 10000.0    # 全局每日预算上限 (USD)
  require_approval_for_create: true     # 创建Campaign需要确认
  require_approval_for_update: true     # 更新Campaign需要确认
  require_approval_for_delete: true     # 删除Campaign需要确认
  auto_pause_on_overspend: true         # 超支自动暂停
  overspend_threshold: 1.1              # 超支阈值 (110%)
  max_retry_attempts: 3
  request_timeout: 30

# 决策引擎设置
decision_engine:
  default_strategy: roas_maximize       # 默认策略
  min_budget_per_platform: 100.0        # 每平台最低预算

# 平台配置
platforms:
  # ==================== 海外平台 (Official MCP) ====================

  google_ads:
    enabled: false                      # 启用此平台
    mcp_server: "pipx run --spec git+https://github.com/googleads/google-ads-mcp.git google-ads-mcp"
    auth_type: oauth2
    credentials:
      developer_token: ""               # Google Ads Developer Token
      client_id: ""                     # OAuth2 Client ID
      client_secret: ""                 # OAuth2 Client Secret
      refresh_token: ""                 # OAuth2 Refresh Token
      login_customer_id: ""             # MCC Account ID (可选)
    budget_limit_daily: 5000.0
    require_approval: true
    extra:
      mcp_args: []

  meta_ads:
    enabled: false
    mcp_server: "npx -y @pipeboard/mcp-meta-ads"
    auth_type: oauth2
    credentials:
      access_token: ""                  # Meta Access Token
      app_id: ""                        # Facebook App ID
      app_secret: ""                    # Facebook App Secret
      ad_account_id: ""                 # Ad Account ID
    budget_limit_daily: 5000.0
    require_approval: true
    extra:
      mcp_args: []

  amazon_dsp:
    enabled: false
    mcp_server: "https://your-amazon-mcp-server.com/mcp"  # 或使用Docker本地部署
    auth_type: oauth2
    credentials:
      client_id: ""                     # Amazon Client ID
      client_secret: ""                 # Amazon Client Secret
      refresh_token: ""                 # Amazon Refresh Token
      profile_id: ""                    # DSP Profile ID
    budget_limit_daily: 10000.0
    require_approval: true

  adform:
    enabled: false
    mcp_server: "https://your-adform-mcp-server.com/mcp"
    auth_type: oauth2
    credentials:
      client_id: ""                     # Adform Client ID
      client_secret: ""                 # Adform Client Secret
      access_token: ""                  # Access Token
    budget_limit_daily: 5000.0
    require_approval: true

  # ==================== 国内平台 (Official MCP + Self-built Adapters) ====================

  oceanengine:
    enabled: false
    mcp_server: "https://open.oceanengine.com/openapi/mcp"  # 巨量引擎官方MCP
    auth_type: oauth2
    credentials:
      app_id: ""                        # 应用ID
      app_secret: ""                    # 应用密钥
      access_token: ""                  # Access Token
      refresh_token: ""                 # Refresh Token
      advertiser_id: ""                 # 广告主ID
    budget_limit_daily: 20000.0         # CNY
    require_approval: true

  tencent_ads:
    enabled: false
    # 腾讯广告无官方MCP，使用自研Adapter
    api_base_url: "https://api.e.qq.com/v3.0"
    auth_type: oauth2
    credentials:
      account_id: ""                    # 账户ID
      access_token: ""                  # Access Token
      client_id: ""                     # 应用ID
      client_secret: ""                 # 应用密钥
    budget_limit_daily: 10000.0         # CNY
    require_approval: true

  kuaishou:
    enabled: false
    # 快手无官方MCP，使用自研Adapter
    api_base_url: "https://ad.e.kuaishou.com/rest/openapi/v1"
    auth_type: oauth2
    credentials:
      advertiser_id: ""                 # 广告主ID
      access_token: ""                  # Access Token
      refresh_token: ""                 # Refresh Token
      app_id: ""                        # 应用ID
    budget_limit_daily: 10000.0         # CNY
    require_approval: true

  baidu_ads:
    enabled: false
    # 百度无官方MCP，使用自研Adapter
    api_base_url: "https://api.baidu.com/json/sms/service"
    auth_type: api_key
    credentials:
      username: ""                      # 用户名
      password: ""                      # 密码
      token: ""                         # API Token
    budget_limit_daily: 5000.0          # CNY
    require_approval: true
