    require_approval: true

  adform:
    enabled: false
    mcp_server: "https://your-adform-mcp-server.com/mcp"
    auth_type: oauth2
    credentials:
      client_id: ""
      client_secret: ""
      access_token: ""
    budget_limit_daily: 5000.0
    require_approval: true

  # ==================== 国内平台 ====================

  oceanengine:
